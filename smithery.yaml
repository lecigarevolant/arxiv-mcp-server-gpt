# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml

startCommand:
  type: http
  configSchema:
    # JSON Schema defining the configuration options for the MCP.
    type: object
    required: []
    properties:
      downloadPath:
        type: string
        default: /data
        description: Path to save downloaded PDFs
  commandFunction:
    # A JS function that produces the CLI command based on the given config to start the MCP over HTTP.
    |-
    (config) => ({
      command: 'python',
      args: ['src/arxiv_server/server.py', '--transport', 'http'],
      env: {
        DOWNLOAD_PATH: config.downloadPath ?? '/data',
        MCP_TRANSPORT: 'http',
        FASTMCP_SSE_PATH: '/.well-known/mcp/sse',
        FASTMCP_MESSAGE_PATH: '/.well-known/mcp/messages/'
      }
    })
  exampleConfig:
    downloadPath: /data
